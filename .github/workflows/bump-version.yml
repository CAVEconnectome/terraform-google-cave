name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute new version
        id: version
        run: |
          # Get the latest semver tag (strip leading 'v')
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "No existing semver tag found, starting from v0.0.0"
            LATEST="v0.0.0"
          fi
          CURRENT="${LATEST#v}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ github.event.inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"
          echo "current_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEW_VERSION (${{ github.event.inputs.bump_type }})"

      - name: Update cookiecutter template versions
        run: |
          OLD_VERSION="${{ steps.version.outputs.current_version }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          FILES=(
            "cookiecutter_templates/global_cave/{{cookiecutter.global_deployment_name}}/{{cookiecutter.global_cluster_prefix}}/terragrunt.hcl"
            "cookiecutter_templates/local_cave/{{cookiecutter.local_environment_name}}/{{cookiecutter.local_cluster_prefix}}/terragrunt.hcl"
            "cookiecutter_templates/local_cave/{{cookiecutter.local_environment_name}}/{{cookiecutter.local_cluster_prefix}}/kubernetes/terragrunt.hcl"
            "cookiecutter_templates/local_cave/{{cookiecutter.local_environment_name}}/static/terragrunt.hcl"
          )
          for FILE in "${FILES[@]}"; do
            if [ -f "$FILE" ]; then
              sed -i "s/version=${OLD_VERSION}/version=${NEW_VERSION}/g" "$FILE"
              echo "Updated $FILE"
            else
              echo "WARNING: $FILE not found, skipping"
            fi
          done

      - name: Commit and tag
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cookiecutter_templates/
          git commit -m "bump cookiecutter template version to ${NEW_VERSION}"
          git tag "${NEW_TAG}"
          git push origin HEAD
          git push origin "${NEW_TAG}"
